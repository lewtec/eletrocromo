[tools]
"github:lucasew/workspaced" = "0.12.0"
go = "1.26.5"
golangci-lint = "2.12.2"

[tasks]
"install:go" = "go mod download"
"install:examples" = """
go -C examples/basic mod download
go -C examples/counter mod download
"""
install = { depends = ["install:*"] }
lint = "workspaced codebase lint --review"
fmt = "workspaced codebase format"
"test:go" = "go test -v ./..."
test = { depends = ["test:*"] }
"codegen:go" = "go generate ./..."
codegen = { depends = ["codegen:*"] }
ci = { depends = ["lint", "test"] }

# Dogfood host resolve + Helium --app (Ctrl+C to quit).
"example:basic" = "go -C examples/basic run ."
"example:counter" = "go -C examples/counter run ."

# Astro + orvalho: tools/tasks live in examples/astro/mise.toml
"example:astro:build" = "mise -C examples/astro run build"
"example:astro" = "mise -C examples/astro run run"
