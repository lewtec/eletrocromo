name: Autorelease

on:
  push:
    branches:
      - main
    # Do not trigger on tags: release pushes a tag, which would re-enter this
    # workflow and mint another version.
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      new_version:
        description: "New tag version"
        type: choice
        default: "patch"
        options:
          - next
          - patch
          - minor
          - major
  schedule:
    - cron: "0 2 * * 6" # saturday 2am

jobs:
  autorelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      # Full history + tags required: svu needs existing tags to bump correctly.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup git config
        run: |
          git config user.name actions-bot
          git config user.email actions-bot@users.noreply.github.com

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3

      - name: Install
        run: mise run install

      - name: CI
        run: mise run ci

      - name: Create Pull Request if there is new stuff from updaters
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        id: pr_create
        with:
          commit-message: "chore: updater script changes"
          branch: updater-bot
          delete-branch: true
          title: "Updater: stuff changed"
          body: |
            Changes caused from update scripts

      - name: Stop if a pull request was created
        if: github.event_name != 'pull_request'
        env:
          PR_NUMBER: ${{ steps.pr_create.outputs.pull-request-number }}
        run: |
          if [[ -n "$PR_NUMBER" ]]; then
            echo "The update scripts changed something and a PR was created. Giving up deploy." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Make release if everything looks right
        if: github.event_name != 'pull_request'
        env:
          # workflow_dispatch sets this; schedule/push to main default to next
          NEW_VERSION: ${{ github.event.inputs.new_version || 'next' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Existing tags (top):"
          git tag --sort=-v:refname | head -10 || true
          echo "svu current=$(svu current 2>/dev/null || true) next=$(svu next) minor=$(svu minor) patch=$(svu patch)"
          mise run release -- "$NEW_VERSION"
